name: ios-build
on:
  push:
    paths:
      - "App/**"
      - "Core/**"
      - "project.yml"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project AICam.xcodeproj \
            -scheme AICam \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
      - name: Package unsigned IPA
        run: |
          mkdir Payload
          cp -R "build/Build/Products/Release-iphoneos/AICam.app" Payload/
          zip -qr AICam-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: AICam-unsigned-ipa
          path: AICam-unsigned.ipa
